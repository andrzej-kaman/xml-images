services:
  - type: web
    name: xml-images
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -c gunicorn.conf.py app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: REDIS_URL
        fromSecret: true
      - key: GEMINI_API_KEY
        fromSecret: true
